name: Feature pipeline

# Runs every hour to pull the latest readings and top up the feature store.
# Also runnable by hand from the Actions tab when you want to force a refresh.
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update-features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build and store features
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT: ${{ secrets.HOPSWORKS_PROJECT }}
        run: python feature_pipeline/build_features.py
